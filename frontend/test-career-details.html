<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Career Details API</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }
        button {
            background: #3b82f6;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
        }
        button:hover {
            background: #2563eb;
        }
        button:disabled {
            background: #94a3b8;
            cursor: not-allowed;
        }
        .result {
            margin-top: 30px;
            padding: 20px;
            background: #f8fafc;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
        }
        .result h3 {
            margin-top: 0;
            color: #1e293b;
        }
        .result pre {
            background: #1e293b;
            color: #e2e8f0;
            padding: 15px;
            border-radius: 6px;
            overflow-x: auto;
            font-size: 14px;
        }
        .error {
            background: #fee;
            border-color: #fcc;
            color: #c33;
        }
        .success {
            background: #efe;
            border-color: #cfc;
            color: #363;
        }
        .loading {
            text-align: center;
            padding: 20px;
            color: #64748b;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 Test Career Details API</h1>
        
        <div class="form-group">
            <label for="career">Career Title:</label>
            <input type="text" id="career" placeholder="e.g., Software Engineer, Data Scientist" value="Software Engineer">
        </div>

        <div class="form-group">
            <label for="interest">Interest (optional):</label>
            <input type="text" id="interest" placeholder="e.g., I love building web applications">
        </div>

        <button id="testBtn" onclick="testCareerDetails()">Generate Career Details</button>

        <div id="result"></div>
    </div>

    <script>
        async function testCareerDetails() {
            const career = document.getElementById('career').value;
            const interest = document.getElementById('interest').value;
            const resultDiv = document.getElementById('result');
            const testBtn = document.getElementById('testBtn');

            if (!career) {
                alert('Please enter a career title');
                return;
            }

            testBtn.disabled = true;
            resultDiv.innerHTML = '<div class="loading">⏳ Generating career details...</div>';

            try {
                const response = await fetch('http://localhost:8000/api/ai/career-details', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        career: career,
                        interest: interest
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    resultDiv.innerHTML = `
                        <div class="result success">
                            <h3>✅ Success!</h3>
                            <p><strong>Career:</strong> ${data.career}</p>
                            ${data.mock ? '<p><em>Note: Using mock data (API key not configured)</em></p>' : ''}
                            <pre>${JSON.stringify(data.details, null, 2)}</pre>
                        </div>
                    `;
                } else {
                    resultDiv.innerHTML = `
                        <div class="result error">
                            <h3>❌ Error</h3>
                            <p>${data.error || 'Unknown error occurred'}</p>
                            <pre>${JSON.stringify(data, null, 2)}</pre>
                        </div>
                    `;
                }
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="result error">
                        <h3>❌ Network Error</h3>
                        <p>${error.message}</p>
                        <p>Make sure the backend server is running on http://localhost:8000</p>
                    </div>
                `;
            } finally {
                testBtn.disabled = false;
            }
        }

        // Test on page load
        window.addEventListener('load', () => {
            console.log('Career Details API Test Page Loaded');
            console.log('Backend URL: http://localhost:8000/api/ai/career-details');
        });
    </script>
</body>
</html>
