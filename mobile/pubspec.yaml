name: careerguide_mobile
description: BiT CareerGuide Mobile App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^13.2.0

  # HTTP & API
  dio: ^5.4.3
  pretty_dio_logger: ^1.3.1

  # Secure Storage (JWT token)
  flutter_secure_storage: ^9.0.0

  # UI & Icons
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0

  # Markdown rendering (lesson content)
  flutter_markdown: ^0.6.22

  # Utilities
  intl: ^0.19.0
  timeago: ^3.6.1
  uuid: ^4.3.3
  image_picker: ^1.1.2
  file_picker: ^8.0.3
  url_launcher: ^6.2.6
  shared_preferences: ^2.2.3

  # Offline / SQLite cache
  sqflite: ^2.3.3
  connectivity_plus: ^6.0.3
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
